name: Build and Sync Binaries

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: read

env:
  OPENSOURCE_PAT: ${{ secrets.OPENSOURCE_PAT }}

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: |
            go-hub/go.sum
            go-shellmcp/go.sum

      - name: Install Python dependencies and test
        run: |
          uv sync
          uv run pytest tests/ -v

      - name: Test Go hub
        run: |
          cd go-hub
          go test ./...

      - name: Test Go shellmcp
        run: |
          cd go-shellmcp
          go test ./...

      - name: Build binaries
        run: |
          chmod +x tools/build.sh
          ./tools/build.sh

      - name: Checkout opensource repo
        if: env.OPENSOURCE_PAT != ''
        uses: actions/checkout@v4
        with:
          repository: megamen32/gptadmin_opensource
          token: ${{ env.OPENSOURCE_PAT }}
          path: gptadmin_opensource

      - name: Sync binaries to opensource repo
        if: env.OPENSOURCE_PAT != ''
        run: |
          rm -rf gptadmin_opensource/binaries/*
          mkdir -p gptadmin_opensource/binaries
          cp -r build/* gptadmin_opensource/binaries/

          cd gptadmin_opensource
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add binaries/
          git commit -m "chore: update binaries from private repo [skip ci]" || echo "No changes to commit"
          git push

      - name: Skip opensource sync when OPENSOURCE_PAT is missing
        if: env.OPENSOURCE_PAT == ''
        run: |
          echo "OPENSOURCE_PAT secret is not configured or is not available for this run."
          echo "Build finished; skipped checkout/push to megamen32/gptadmin_opensource."
