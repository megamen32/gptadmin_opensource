name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psutil requests httpx

      - name: Run tests
        run: python -m pytest tests/ -v || true

      - name: Build package
        run: |
          mkdir -p build
          tar -czf build/gptadmin-${{ github.ref_name }}.tar.gz \
            go-hub/ go-shellmcp/ server_for_installer.py \
            gptadmin_security.py cli.py telegram_logs_bot.py \
            client/ public/ deploy/ tests/ \
            --exclude='*.pyc' --exclude='__pycache__' || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: build/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
