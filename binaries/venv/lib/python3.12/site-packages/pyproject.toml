[project]
name = "gptadmin"
version = "0.1.0"
description = "GPT‑Админ — one MCP hub, any AI controls any infrastructure"
readme = "README.md"
license = "AGPL-3.0-only"
requires-python = ">=3.10"
authors = [
    { name = "GPT‑Админ" },
]
keywords = ["mcp", "mcp-server", "ai", "server-admin", "chatgpt", "claude", "self-hosted"]
classifiers = [
    "License :: OSI Approved :: GNU Affero General Public License v3",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Operating System :: OS Independent",
    "Topic :: System :: Systems Administration",
]
dependencies = [
    "fastapi>=0.104.0",
    "uvicorn[standard]>=0.24.0",
    "pydantic>=2.0.0",
    "psutil>=5.9.0",
    "requests>=2.31.0",
    "httpx>=0.25.0",
    "aiogram>=3.0.0",
    "cryptography>=41.0.0",
    "paramiko>=3.3.0",
]

[dependency-groups]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.21.0",
    "pyarmor>=8.0.0",
    "pyinstaller>=6.0.0",
]

[project.scripts]
gptadmin = "cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["."]
exclude = ["build", "tests", ".venv", ".buildcache", ".claude", ".serena", "docs"]
